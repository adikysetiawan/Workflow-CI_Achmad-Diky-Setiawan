name: MLflow CI/CD Pipeline to Docker Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v3

      - name: 2. Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn pandas

      - name: 4. Run MLflow Project
        run: |
          mlflow run MLProject --env-manager=local

      - name: 5. Get latest MLflow run_id
        id: get_run
        run: |
          RUN_ID=$(python -c "import mlflow; print(mlflow.search_runs(experiment_ids=['0']).iloc[0].run_id)")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Berhasil mendapatkan Run ID: $RUN_ID"

      - name: 6. Upload to GitHub (Menyimpan Artefak)
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: mlruns/0/${{ env.RUN_ID }}/artifacts/

      - name: 7. Build Docker Model
        # GANTI 'usernamekamu' dengan Username Docker Hub kamu di baris bawah ini!
        run: |
          mlflow models build-docker -m "mlruns/0/${{ env.RUN_ID }}/artifacts/model" -n adikysetiawan/prediksi-harga-rumah:latest --env-manager=conda

      - name: 8. Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: adikysetiawan
          password: ${{ secrets.Diky_Moeslim21 }}

      - name: 9. Push Docker Image
        run: |
          docker push adikysetiawan/prediksi-harga-rumah:latest
