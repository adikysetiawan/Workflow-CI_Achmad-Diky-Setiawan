name: MLflow CI/CD Pipeline to Docker Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v3

      - name: 2. Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn pandas

      - name: 4. Run MLflow Project
        run: |
          mlflow run MLProject --env-manager=local

      - name: 5. Get latest MLflow run_id
        id: get_run
        run: |
          RUN_ID=$(python -c "import mlflow; print(mlflow.search_runs(experiment_ids=['0']).iloc[0].run_id)")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Berhasil mendapatkan Run ID: $RUN_ID"

      - name: 6. Upload to GitHub (Menyimpan Artefak)
        uses: actions/upload-artifact@v4
        with:
        name: model-artifacts
        path: mlruns/0/${{ env.RUN_ID }}/artifacts/

      - name: 6.5. HACK MLFLOW SOURCE CODE (Fix Internet Bug)
        run: |
          echo "Menyuntikkan patch ke source code MLflow untuk memperbaiki link pip Python 3.9..."
          find /opt/hostedtoolcache/Python/3.12.7/x64/lib/python3.12/site-packages/mlflow/ -type f -name "*.py" -exec sed -i 's|https://bootstrap.pypa.io/get-pip.py|https://bootstrap.pypa.io/pip/3.9/get-pip.py|g' {} +
          echo "Patch berhasil disuntikkan!"

      - name: 7. Build Docker Model
        # INGAT: Ganti 'username_kamu' dengan username Docker Hub-mu (HURUF KECIL SEMUA!)
        run: |
          mlflow models build-docker -m "mlruns/0/${{ env.RUN_ID }}/artifacts/model" -n adikysetiawan/prediksi-harga-rumah:latest

      - name: 8. Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 9. Push Docker Image
        run: |
          docker push adikysetiawan/prediksi-harga-rumah:latest
